name: Raio-X Corporativo (Trimestral)

on:
  schedule:
    # Roda toda segunda-feira às 8h BRT (11h UTC)
    # Balanços são trimestrais, mas rodamos semanal pra pegar atualizações
    - cron: '0 11 * * 1'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coletor Raio-X Corporativo
        run: python coletor_raiox_corp.py

      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raiox_corp.json
          git diff --staged --quiet || git commit -m "Raio-X Corporativo atualizado $(date +'%d/%m %H:%M UTC')"
          git push
