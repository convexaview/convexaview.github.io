name: Coletor de Dados e Notícias

on:
  schedule:
    # Roda a cada 30 minutos, das 10h às 19h (horário de Brasília = UTC-3)
    # UTC 13:00-22:00 = BRT 10:00-19:00 (durante pregão + margem)
    - cron: '*/30 13-22 * * 1-5'
    # Fora do horário comercial: 1x por hora
    - cron: '0 0-12,23 * * 1-5'
    # Fins de semana: 2x por dia
    - cron: '0 12,20 * * 0,6'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coletor
        run: python coletor.py

      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json noticias.json
          git diff --staged --quiet || git commit -m "Atualização automática $(date +'%d/%m %H:%M UTC')"
          git push
